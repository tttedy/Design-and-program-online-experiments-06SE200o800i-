<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>multiple timeline</title>

  <body>
    <!-- The experiment script is loaded as a module -->
    <script>
        /* exercise 6.2.2:  */
        /* 1. use push() to add trial1,trial2,trial_end into timeline
           2. run timeline array wiht jsPsych
         */
        
        /* plus 2: can you think of a way to run trial2 -> trial1 -> trial_end*/

      // Initialize jsPsych 
      const jsPsych = initJsPsych();

      const timeline = []; 

      // Define your trials using the imported plugin.
      const trial1 = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: 'Trial 1',
        choices: "ALL_KEYS"
      };
     

      const trial2 = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: 'Trial 2',
        choices: "ALL_KEYS"
      };
     

      const trial_end = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: 'End',
        choices: "NO_KEYS"
      };
     

      // run timeline
      jsPsych.run();

  
    </script>
  </body>
